syntax = "proto3";
package agent;
option go_package = "agentscope/gen/agent";

service AgentMonitor {
    rpc StreamEvents(stream AgentEvent) returns (Ack);
}

message AgentEvent {
    string host         = 1;
    uint32 pid          = 2;
    double timestamp    = 3;
    string direction    = 4;  // "send" | "recv"
    string comm_type    = 5;  // Agentâ†”Model | Agentâ†”Agent | Agentâ†”MCP
    string content_type = 6;  // TEXT | FILE_READ | FILE | IMAGE
    string peer         = 7;
    bytes  request      = 8;  // JSON bytes (skip UTF-8 validation, zero-copy on the wire)
    bytes  response     = 9;
    double latency_ms   = 10;
}

message Ack {}
